name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  target-prep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install pytest biotite biopython numpy
      - name: Run target-prep geometry tests
        run: pytest tests/ -v
