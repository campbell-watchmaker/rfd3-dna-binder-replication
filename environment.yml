name: rfd3-dna-replication
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.13
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - biotite        # structure parsing, H-bond geometry, DNA analysis
  - biopython
  - openmm         # open-source MD/energy-minimization (replaces Rosetta FastRelax)
  - pdbfixer       # structure prep for OpenMM (adds missing atoms/termini)
  - requests
  - pip
  - pip:
      - fair-esm   # ESM-2 protein embeddings (TF/design sequence-space map)
